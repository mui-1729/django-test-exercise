{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
    <form action="{% url 'update' task.id%}" method="post" class="task-form">
      {% csrf_token %}
      <div>
        <label for="titleInput">Title</label>
        <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
      </div>
      <div>
        <label for="dueInput">Due at</label>
        <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at|date:'Y-m-d\\TH:i' }}">
      </div>
      <div>
        <label for="notesInput">Notes</label>
        <textarea id="notesInput" name="notes" rows="4">{{ task.notes }}</textarea>
      </div>
      <div>
        <label for="priorityInput">Priority</label>
        <select id="priorityInput" name="priority">
        {% for value, label in priority_choices %}
          <option value="{{ value }}" {% if task.priority == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
    <p><a href="{% url 'detail' task.id %}">Cancel</a></p>
  </body>

</html>
